<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente vertical en escala de grises: edita stop-color aqui -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FCA3AF"/>
      <stop offset="100%" stop-color="#ff6ec4"/>
    </linearGradient>
    <clipPath id="cardClip">
      <rect x="0" y="0" width="600" height="600" rx="28" ry="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#cardClip)">
    <rect x="0" y="0" width="600" height="600" fill="url(#bgGradient)"/>

    <circle cx="300" cy="170" r="46" fill="#FFFFFF" opacity="0.12"/>
    <g transform="translate(300,170)">
      <g fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linejoin="round">
  <rect x="-22" y="-22" width="20" height="20" rx="4"/>
  <rect x="2" y="-22" width="20" height="20" rx="4"/>
  <rect x="-22" y="2" width="20" height="20" rx="4"/>
  <rect x="2" y="2" width="20" height="20" rx="4"/>
</g>
<path d="M0,-12 C2,-4 4,-2 12,0 C4,2 2,4 0,12 C-2,4 -4,2 -12,0 C-4,-2 -2,-4 0,-12 Z" fill="#FFFFFF" stroke="none" transform="translate(12,-12) scale(0.8)"/>
    </g>

    <text x="300" y="285" text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif" font-weight="800"
          font-size="52" fill="#FFFFFF">AI Catalog</text>

    <line x1="200" y1="318" x2="400" y2="318" stroke="#FFFFFF" stroke-width="2" opacity="0.7"/>

    <text x="300" y="368" text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif" font-weight="400"
          font-size="25" fill="#FFFFFF" opacity="0.9">Claude agents &amp; skills</text>

    <rect x="230" y="446" width="140" height="46" rx="12" ry="12" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.85"/>
    <text x="300" y="469" text-anchor="middle" dominant-baseline="central"
          font-family="Arial, Helvetica, sans-serif" font-weight="700"
          font-size="26" fill="#FFFFFF">Explore</text>
  </g>

  <rect x="1.5" y="1.5" width="597" height="597" rx="28" ry="28" fill="none" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="3"/>
</svg>
