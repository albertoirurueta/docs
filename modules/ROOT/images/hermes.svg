    <circle cx="300" cy="170" r="46" fill="#FFFFFF" opacity="0.12"/>
    <g transform="translate(300,170)">
      <g fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
  <circle cx="-8" cy="-8" r="16"/>
  <line x1="4" y1="4" x2="20" y2="20"/>
  <circle cx="-8" cy="-8" r="1.5" fill="#FFFFFF" stroke="none"/>
</g>
<path d="M-10 -16 l2.5 5.5 L-2 -8 l-5.5 2.5 L-10 0 l-2.5 -5.5 L-18 -8 l5.5 -2.5 Z" fill="#FFFFFF" stroke="none" transform="translate(2,-6) scale(0.55)"/>
    </g>

    <text x="300" y="285" text-anchor="middle"
