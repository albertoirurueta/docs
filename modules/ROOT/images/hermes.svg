      <stop offset="0%" stop-color="#FCA3AF"/>
      <stop offset="100%" stop-color="#7873f5"/>
    </linearGradient>
    <clipPath id="cardClip">
      <rect x="0" y="0" width="600" height="600" rx="28" ry="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#cardClip)">
