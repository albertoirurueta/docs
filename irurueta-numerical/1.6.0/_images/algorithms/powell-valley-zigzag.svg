<svg viewBox="0 0 640 425" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">
  <style>
    .contour { fill:none; stroke:#94a3b8; stroke-width:1.25; }
    .zigzag { fill:none; stroke:#2563eb; stroke-width:2; }
    .pt { fill:#ffffff; stroke:#2563eb; stroke-width:2; }
    .lbl { fill:#334155; font-size:13px; }
    .cap { fill:#0f172a; font-size:15px; font-weight:600; }
    .note { fill:#334155; font-size:12.5px; }
  </style>

  <text class="cap" x="20" y="26">Coordinate-direction search in a long, narrow valley</text>

  <g transform="translate(20,40)">
    <g transform="rotate(-28 560 90)">
      <ellipse class="contour" cx="560" cy="90" rx="430" ry="150"/>
      <ellipse class="contour" cx="560" cy="90" rx="330" ry="110"/>
      <ellipse class="contour" cx="560" cy="90" rx="230" ry="75"/>
      <ellipse class="contour" cx="560" cy="90" rx="130" ry="42"/>
      <ellipse class="contour" cx="560" cy="90" rx="45" ry="15"/>
    </g>

    <path class="zigzag" d="M 130 300 L 170 300 L 170 280 L 205 280 L 205 260 L 240 260 L 240 242
                             L 275 242 L 275 225 L 310 225 L 310 208 L 345 208 L 345 192 L 380 192
                             L 380 175 L 415 175 L 415 158 L 450 158 L 450 140 L 485 140 L 485 122
                             L 510 122 L 510 100"/>
    <circle class="pt" cx="130" cy="300" r="5"/>
    <circle cx="560" cy="90" r="4" fill="#2563eb" stroke="none"/>

    <text class="lbl" x="90" y="322">start</text>
    <text class="lbl" x="566" y="82">minimum</text>
    <text class="note" x="0" y="345">Each cycle minimizes along x, then along y &#8212; but the valley runs diagonally, so</text>
    <text class="note" x="0" y="362">neither direction points toward the minimum, forcing many tiny crossing steps.</text>
  </g>
</svg>
