<svg viewBox="0 0 560 320" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">
  <style>
    .link { stroke:#94a3b8; stroke-width:1.25; }
    .pt { fill:#ffffff; stroke:#1e293b; stroke-width:2; }
    .ptfinal { fill:#2563eb; stroke:#2563eb; stroke-width:2; }
    .lbl { fill:#334155; font-size:13px; }
    .lblfinal { fill:#2563eb; font-size:13px; font-weight:600; }
    .xlbl { fill:#334155; font-size:13px; font-style:italic; }
    .cap { fill:#0f172a; font-size:15px; font-weight:600; }
  </style>

  <text class="cap" x="10" y="24">Neville's algorithm: each estimate is built from its two "parents"</text>

  <!-- column 0 -->
  <text class="xlbl" x="10" y="254">x0:</text>
  <text class="xlbl" x="10" y="194">x1:</text>
  <text class="xlbl" x="10" y="134">x2:</text>
  <text class="xlbl" x="10" y="74">x3:</text>

  <!-- links: parent -> child -->
  <line class="link" x1="60" y1="250" x2="180" y2="220"/>
  <line class="link" x1="60" y1="190" x2="180" y2="220"/>
  <line class="link" x1="60" y1="190" x2="180" y2="160"/>
  <line class="link" x1="60" y1="130" x2="180" y2="160"/>
  <line class="link" x1="60" y1="130" x2="180" y2="100"/>
  <line class="link" x1="60" y1="70"  x2="180" y2="100"/>

  <line class="link" x1="180" y1="220" x2="300" y2="190"/>
  <line class="link" x1="180" y1="160" x2="300" y2="190"/>
  <line class="link" x1="180" y1="160" x2="300" y2="130"/>
  <line class="link" x1="180" y1="100" x2="300" y2="130"/>

  <line class="link" x1="300" y1="190" x2="420" y2="160"/>
  <line class="link" x1="300" y1="130" x2="420" y2="160"/>

  <!-- nodes -->
  <circle class="pt" cx="60" cy="250" r="6"/>
  <circle class="pt" cx="60" cy="190" r="6"/>
  <circle class="pt" cx="60" cy="130" r="6"/>
  <circle class="pt" cx="60" cy="70" r="6"/>

  <circle class="pt" cx="180" cy="220" r="6"/>
  <circle class="pt" cx="180" cy="160" r="6"/>
  <circle class="pt" cx="180" cy="100" r="6"/>

  <circle class="pt" cx="300" cy="190" r="6"/>
  <circle class="pt" cx="300" cy="130" r="6"/>

  <circle class="ptfinal" cx="420" cy="160" r="7"/>

  <!-- labels -->
  <text class="lbl" x="70" y="254">P0</text>
  <text class="lbl" x="70" y="194">P1</text>
  <text class="lbl" x="70" y="134">P2</text>
  <text class="lbl" x="70" y="74">P3</text>

  <text class="lbl" x="190" y="224">P01</text>
  <text class="lbl" x="190" y="164">P12</text>
  <text class="lbl" x="190" y="104">P23</text>

  <text class="lbl" x="310" y="194">P012</text>
  <text class="lbl" x="310" y="134">P123</text>

  <text class="lblfinal" x="432" y="164">P0123</text>
  <text class="lbl" x="400" y="200" fill="#2563eb" font-size="11">interpolated value at x</text>

</svg>
