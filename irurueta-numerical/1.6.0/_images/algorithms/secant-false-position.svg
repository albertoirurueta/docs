<svg viewBox="0 0 640 300" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">
  <style>
    .panel-card { fill:none; stroke:#e2e8f0; stroke-width:1.5; }
    .curve { fill:none; stroke:#1e293b; stroke-width:2.5; stroke-linecap:round; }
    .axis { stroke:#94a3b8; stroke-width:1.25; }
    .secant { stroke:#2563eb; stroke-width:1.5; stroke-dasharray:5 4; fill:none; }
    .fpos { stroke:#f97316; stroke-width:1.5; stroke-dasharray:5 4; fill:none; }
    .pt { fill:#ffffff; stroke-width:2; }
    .lbl { fill:#334155; font-size:13px; }
    .cap { fill:#0f172a; font-size:14px; font-weight:600; }
    .note { fill:#334155; font-size:11px; }
  </style>

  <!-- panel (a): secant method, both points move every iteration -->
  <g transform="translate(20,20)">
    <rect class="panel-card" x="0" y="0" width="280" height="240" rx="10"/>
    <text class="cap" x="12" y="24">(a) secant method</text>
    <line class="axis" x1="30" y1="160" x2="270" y2="160"/>
    <path class="curve" d="M 40 205 C 90 200, 140 185, 170 160 C 200 130, 240 70, 260 35"/>
    <path class="secant" d="M 40 205 L 260 35"/>
    <path class="secant" d="M 260 35 L 150 160"/>
    <path class="secant" d="M 150 160 L 176 160"/>
    <circle class="pt" cx="40" cy="205" r="4" stroke="#2563eb"/>
    <circle class="pt" cx="260" cy="35" r="4" stroke="#2563eb"/>
    <circle class="pt" cx="150" cy="160" r="4" stroke="#2563eb"/>
    <circle class="pt" cx="176" cy="160" r="4" stroke="#2563eb"/>
    <text class="lbl" x="34" y="222" fill="#2563eb">1</text>
    <text class="lbl" x="256" y="28" fill="#2563eb">2</text>
    <text class="lbl" x="138" y="178" fill="#2563eb">3</text>
    <text class="lbl" x="180" y="178" fill="#2563eb">4</text>
    <text class="note" x="30" y="232">every new estimate uses the two most recent points</text>
  </g>

  <!-- panel (b): false position, point 1 stays active for many iterations -->
  <g transform="translate(340,20)">
    <rect class="panel-card" x="0" y="0" width="280" height="240" rx="10"/>
    <text class="cap" x="12" y="24">(b) false position</text>
    <line class="axis" x1="30" y1="160" x2="270" y2="160"/>
    <path class="curve" d="M 40 205 C 90 200, 140 185, 170 160 C 200 130, 240 70, 260 35"/>
    <path class="fpos" d="M 40 205 L 260 35"/>
    <path class="fpos" d="M 40 205 L 150 160"/>
    <path class="fpos" d="M 40 205 L 163 160"/>
    <circle class="pt" cx="40" cy="205" r="4" stroke="#f97316"/>
    <circle class="pt" cx="260" cy="35" r="4" stroke="#f97316"/>
    <circle class="pt" cx="150" cy="160" r="4" stroke="#f97316"/>
    <circle class="pt" cx="163" cy="160" r="4" stroke="#f97316"/>
    <text class="lbl" x="34" y="222" fill="#f97316">1</text>
    <text class="lbl" x="256" y="28" fill="#f97316">2</text>
    <text class="lbl" x="138" y="178" fill="#f97316">3</text>
    <text class="lbl" x="167" y="178" fill="#f97316">4</text>
    <text class="note" x="30" y="232">point 1 remains bracketing for many iterations</text>
  </g>
</svg>
