<svg viewBox="0 0 640 375" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">
  <style>
    .curve { fill:none; stroke:#1e293b; stroke-width:2.5; stroke-linecap:round; }
    .parab1 { fill:none; stroke:#2563eb; stroke-width:1.5; stroke-dasharray:6 4; }
    .parab2 { fill:none; stroke:#f97316; stroke-width:1.5; stroke-dasharray:2 3; }
    .guide { stroke:#94a3b8; stroke-width:1; stroke-dasharray:3 3; }
    .pt { fill:#ffffff; stroke-width:2; }
    .lbl { fill:#334155; font-size:14px; font-weight:600; }
    .cap { fill:#0f172a; font-size:15px; font-weight:600; }
    .note { fill:#334155; font-size:12.5px; }
    .legend { font-size:12px; fill:#334155; }
  </style>

  <text class="cap" x="20" y="26">Parabolic interpolation converging to a minimum</text>

  <g transform="translate(20,30)">
    <path class="curve" d="M 40 61.66 L 55 103.62 L 70 138.54 L 85 167.26 L 100 190.56 L 115 209.16 L 130 223.75 L 145 234.95 L 160 243.33 L 175 249.4 L 190 253.65 L 205 256.46 L 220 258.22 L 235 259.23 L 250 259.73 L 265 259.93 L 280 259.99 L 295 260.0 L 310 260.0 L 325 259.98 L 340 259.89 L 355 259.6 L 370 258.96 L 385 257.73 L 400 255.66 L 415 252.41 L 430 247.6 L 445 240.81 L 460 231.56 L 475 219.29 L 490 203.44 L 505 183.35 L 520 158.33 L 535 127.63 L 550 90.46"/>

    <!-- parabola through 1, 2, 3 (dashed): vertex is trial point 4 -->
    <path class="parab1" d="M 150 212.66 L 170.83 225.19 L 191.67 236.04 L 212.5 245.22 L 233.33 252.72 L 254.17 258.56 L 275 262.72 L 295.83 265.2 L 316.67 266.02 L 337.5 265.16 L 358.33 262.63 L 379.17 258.43 L 400 252.55"/>

    <!-- parabola through 2, 3, 4 (dotted): vertex is trial point 5 -->
    <path class="parab2" d="M 260 259.89 L 274.17 260.68 L 288.33 260.96 L 302.5 260.73 L 316.67 259.98 L 330.83 258.73 L 345 256.96 L 359.17 254.68 L 373.33 251.89 L 387.5 248.58 L 401.67 244.77 L 415.83 240.44 L 430 235.6"/>

    <line class="guide" x1="80" y1="158.3" x2="80" y2="300"/>
    <line class="guide" x1="480" y1="214.4" x2="480" y2="300"/>
    <line class="guide" x1="260" y1="259.9" x2="260" y2="300"/>
    <line class="guide" x1="316.4" y1="260" x2="316.4" y2="300"/>
    <line class="guide" x1="289" y1="260" x2="289" y2="300"/>

    <circle class="pt" cx="80" cy="158.3" r="5" stroke="#1e293b"/>
    <circle class="pt" cx="480" cy="214.4" r="5" stroke="#1e293b"/>
    <circle class="pt" cx="260" cy="259.9" r="5" stroke="#2563eb"/>
    <circle class="pt" cx="316.4" cy="260" r="5" stroke="#2563eb"/>
    <circle class="pt" cx="289" cy="260" r="5" stroke="#f97316"/>

    <text class="lbl" x="72" y="150">1</text>
    <text class="lbl" x="472" y="206">2</text>
    <text class="lbl" x="248" y="280">3</text>
    <text class="lbl" x="320" y="250">4</text>
    <text class="lbl" x="270" y="290">5</text>

    <line class="parab1" x1="440" y1="45" x2="470" y2="45"/>
    <text class="legend" x="475" y="49">parabola through 1, 2, 3</text>
    <line class="parab2" x1="440" y1="62" x2="470" y2="62"/>
    <text class="legend" x="475" y="66">parabola through 2, 3, 4</text>

    <text class="note" x="0" y="320">Each parabola's vertex becomes the next trial point: 3, then 4, then 5 &#8212; each one</text>
    <text class="note" x="0" y="335">landing closer to the true minimum than the last.</text>
  </g>
</svg>
