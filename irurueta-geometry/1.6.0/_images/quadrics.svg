<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="800" height="460" fill="#ffffff"/>
  <text x="400" y="26" text-anchor="middle" font-size="17" font-weight="600" fill="#111827">Quadrics: Sphere and Ellipsoid as specializations of the general 3D second-degree surface</text>

  <!-- Sphere -->
  <g>
    <ellipse cx="220" cy="220" rx="130" ry="38" fill="none" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="4 3"/>
    <ellipse cx="220" cy="220" rx="38" ry="130" fill="none" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="4 3"/>
    <circle cx="220" cy="220" r="130" fill="none" stroke="#2563eb" stroke-width="2.5"/>
    <circle cx="220" cy="220" r="4" fill="#111827"/>
    <line x1="220" y1="220" x2="332.6" y2="155" stroke="#2563eb" stroke-width="1.5"/>
    <text x="290" y="182" font-size="13" fill="#2563eb" font-weight="600">r</text>
    <text x="220" y="380" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Sphere</text>
    <text x="220" y="396" text-anchor="middle" font-size="11" fill="#64748b">center + radius r &#8212; quadric with a=b=c, d=e=f=0</text>
  </g>

  <!-- Ellipsoid: same perpendicular-foreshortened-ellipse wireframe convention as the sphere above,
       but with three distinct semi-axes a > b > c (c is the thin, most-foreshortened one) -->
  <g>
    <ellipse cx="580" cy="220" rx="130" ry="22" fill="none" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="4 3"/>
    <ellipse cx="580" cy="220" rx="22" ry="70" fill="none" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="4 3"/>
    <ellipse cx="580" cy="220" rx="130" ry="70" fill="none" stroke="#16a34a" stroke-width="2.5"/>
    <circle cx="580" cy="220" r="4" fill="#111827"/>
    <line x1="580" y1="220" x2="710" y2="220" stroke="#16a34a" stroke-width="1.5"/>
    <text x="700" y="214" font-size="13" fill="#16a34a" font-weight="600">a</text>
    <line x1="580" y1="220" x2="580" y2="290" stroke="#16a34a" stroke-width="1.5"/>
    <text x="586" y="285" font-size="13" fill="#16a34a" font-weight="600">b</text>
    <text x="580" y="380" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Ellipsoid</text>
    <text x="580" y="396" text-anchor="middle" font-size="11" fill="#64748b">center + rotation + independent semi-axes (a, b, c &#8212; c out of view)</text>
  </g>

  <rect x="60" y="420" width="680" height="30" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="400" y="440" text-anchor="middle" font-size="12.5" fill="#334155">Both are stored as a symmetric 4&#215;4 matrix (10 parameters); Sphere/Ellipsoid convert to/from Quadric via toQuadric() / setFromQuadric().</text>
</svg>
