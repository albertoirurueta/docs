<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="900" height="380" fill="#ffffff"/>
  <text x="450" y="26" text-anchor="middle" font-size="17" font-weight="600" fill="#111827">The plane at infinity &#928;&#8734; and the line at infinity l&#8734;</text>

  <!-- LEFT: projective cube with vanishing points -->
  <g>
    <text x="215" y="52" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Projective view: 3 vanishing points define &#928;&#8734;</text>
    <!-- cube edges converging to 3 vanishing points (perspective) -->
    <g stroke="#2563eb" stroke-width="1.6" fill="none">
      <line x1="140" y1="230" x2="60" y2="130"/>
      <line x1="180" y1="260" x2="60" y2="130"/>
      <line x1="140" y1="230" x2="360" y2="120"/>
      <line x1="220" y1="280" x2="360" y2="120"/>
      <line x1="140" y1="230" x2="150" y2="330"/>
      <line x1="180" y1="260" x2="190" y2="345"/>
      <line x1="220" y1="280" x2="215" y2="345"/>
    </g>
    <polygon points="140,230 180,260 220,280 190,250" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.6"/>
    <circle cx="60" cy="130" r="4" fill="#dc2626"/>
    <text x="42" y="118" font-size="11.5" fill="#dc2626">M<tspan baseline-shift="sub" font-size="8.5">X</tspan></text>
    <circle cx="360" cy="120" r="4" fill="#16a34a"/>
    <text x="368" y="112" font-size="11.5" fill="#16a34a">M<tspan baseline-shift="sub" font-size="8.5">Y</tspan></text>
    <circle cx="190" cy="345" r="4" fill="#d97706"/>
    <text x="196" y="358" font-size="11.5" fill="#d97706">M<tspan baseline-shift="sub" font-size="8.5">Z</tspan></text>
    <text x="210" y="100" text-anchor="middle" font-size="11" fill="#64748b">M<tspan baseline-shift="sub" font-size="8">X</tspan>, M<tspan baseline-shift="sub" font-size="8">Y</tspan>, M<tspan baseline-shift="sub" font-size="8">Z</tspan> span the identified &#928;&#8734;</text>
  </g>

  <line x1="450" y1="70" x2="450" y2="330" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- RIGHT: affine view, parallel edges -->
  <g>
    <text x="685" y="52" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Affine view: vanishing points sent back to &#928;&#8734;</text>
    <g stroke="#16a34a" stroke-width="1.6" fill="none">
      <line x1="590" y1="230" x2="620" y2="150"/>
      <line x1="630" y1="255" x2="660" y2="175"/>
      <line x1="590" y1="230" x2="700" y2="205"/>
      <line x1="620" y1="150" x2="730" y2="125"/>
      <line x1="590" y1="230" x2="590" y2="320"/>
      <line x1="630" y1="255" x2="630" y2="345"/>
      <line x1="700" y1="205" x2="700" y2="295"/>
    </g>
    <polygon points="590,230 630,255 700,205 660,175" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.6"/>
    <text x="685" y="335" text-anchor="middle" font-size="11" fill="#64748b">edges that met at M<tspan baseline-shift="sub" font-size="8">X</tspan>/M<tspan baseline-shift="sub" font-size="8">Y</tspan>/M<tspan baseline-shift="sub" font-size="8">Z</tspan> are now parallel</text>
  </g>

  <text x="30" y="368" font-size="12.5" fill="#334155">&#928;&#8734; = (0,0,0,1)&#7488;  (canonical form, only in the affine/metric/Euclidean strata)</text>
  <text x="470" y="368" font-size="12.5" fill="#334155">l&#8734; = line through the vanishing points, lying in &#928;&#8734;</text>
</svg>
