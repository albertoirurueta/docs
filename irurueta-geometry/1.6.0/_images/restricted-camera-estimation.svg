<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="900" height="400" fill="#ffffff"/>
  <text x="450" y="26" text-anchor="middle" font-size="17" font-weight="600" fill="#111827">Restricted camera estimation: how much of K is assumed known</text>
  <text x="450" y="46" text-anchor="middle" font-size="12" fill="#64748b">HZ &#167;7.3: "common assumptions" -- zero skew, square pixels, known principal point, known K</text>

  <line x1="60" y1="90" x2="840" y2="90" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="840,90 828,84 828,96" fill="#94a3b8"/>
  <text x="450" y="112" text-anchor="middle" font-size="12" fill="#64748b">fewer unknowns to solve for &#8594;</text>

  <g>
    <rect x="40" y="140" width="230" height="180" rx="6" fill="#fef2f2" stroke="#fca5a5"/>
    <circle cx="90" cy="90" r="6" fill="#dc2626"/>
    <text x="155" y="168" text-anchor="middle" font-size="13" font-weight="600" fill="#991b1b">DLT</text>
    <text x="155" y="188" text-anchor="middle" font-size="11.5" fill="#334155">solves for all 11 DOF of P</text>
    <text x="155" y="206" text-anchor="middle" font-size="11.5" fill="#334155">no assumption about K, R, C</text>
    <text x="155" y="230" text-anchor="middle" font-size="11" fill="#64748b">6 point correspondences</text>
    <text x="155" y="248" text-anchor="middle" font-size="11" fill="#64748b">(2 eq. each, 11 needed)</text>
    <text x="155" y="272" text-anchor="middle" font-size="11" fill="#64748b">DLTPointCorrespondence-</text>
    <text x="155" y="288" text-anchor="middle" font-size="11" fill="#64748b">PinholeCameraEstimator</text>
  </g>

  <g>
    <rect x="335" y="140" width="230" height="180" rx="6" fill="#fff7ed" stroke="#fdba74"/>
    <circle cx="385" cy="90" r="6" fill="#d97706"/>
    <text x="450" y="168" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">EPnP</text>
    <text x="450" y="188" text-anchor="middle" font-size="11.5" fill="#334155">K assumed fully known</text>
    <text x="450" y="206" text-anchor="middle" font-size="11.5" fill="#334155">solves only for R, C (6 DOF)</text>
    <text x="450" y="230" text-anchor="middle" font-size="11" fill="#64748b">6 point correspondences</text>
    <text x="450" y="248" text-anchor="middle" font-size="11" fill="#64748b">(classical EPnP needs as few as 4)</text>
    <text x="450" y="272" text-anchor="middle" font-size="11" fill="#64748b">EPnPPointCorrespondence-</text>
    <text x="450" y="288" text-anchor="middle" font-size="11" fill="#64748b">PinholeCameraEstimator</text>
  </g>

  <g>
    <rect x="630" y="140" width="230" height="180" rx="6" fill="#eff6ff" stroke="#93c5fd"/>
    <circle cx="680" cy="90" r="6" fill="#2563eb"/>
    <text x="745" y="168" text-anchor="middle" font-size="13" font-weight="600" fill="#1d4ed8">UPnP</text>
    <text x="745" y="188" text-anchor="middle" font-size="11.5" fill="#334155">K only partly known: zero skew,</text>
    <text x="745" y="204" text-anchor="middle" font-size="11.5" fill="#334155">square pixels, known/assumed p&#8320;</text>
    <text x="745" y="222" text-anchor="middle" font-size="11.5" fill="#334155">solves for R, C *and* focal length</text>
    <text x="745" y="246" text-anchor="middle" font-size="11" fill="#64748b">6 point correspondences</text>
    <text x="745" y="270" text-anchor="middle" font-size="11" fill="#64748b">UPnPPointCorrespondence-</text>
    <text x="745" y="286" text-anchor="middle" font-size="11" fill="#64748b">PinholeCameraEstimator</text>
  </g>

  <text x="450" y="352" text-anchor="middle" font-size="12.5" fill="#334155">HZ &#167;7.1, p.178: "the internal parameters can be computed directly, without necessitating estimating P".</text>
  <text x="450" y="372" text-anchor="middle" font-size="11" fill="#64748b">All three still solve for R and C from the same 6 correspondences -- only how much of K they must also recover changes.</text>
</svg>
