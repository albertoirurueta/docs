<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="900" height="620" fill="#ffffff"/>
  <text x="450" y="26" text-anchor="middle" font-size="17" font-weight="600" fill="#111827">Conics: plane sections of a double cone, classified by b&#178; - ac</text>

  <!-- double cone -->
  <g fill="none" stroke="#334155" stroke-width="1.5">
    <line x1="450" y1="240" x2="300" y2="380"/>
    <line x1="450" y1="240" x2="600" y2="380"/>
    <ellipse cx="450" cy="380" rx="150" ry="32"/>
    <line x1="450" y1="240" x2="300" y2="75"/>
    <line x1="450" y1="240" x2="600" y2="75"/>
    <ellipse cx="450" cy="75" rx="150" ry="32" stroke-dasharray="3 3"/>
  </g>

  <!-- cutting planes (edge-on) -->
  <line x1="353.6" y1="330" x2="546.4" y2="330" stroke="#2563eb" stroke-width="2.5"/>
  <line x1="370" y1="290" x2="530" y2="350" stroke="#16a34a" stroke-width="2.5"/>
  <line x1="390" y1="255" x2="510" y2="382" stroke="#d97706" stroke-width="2.5"/>
  <line x1="430" y1="110" x2="475" y2="360" stroke="#dc2626" stroke-width="2.5"/>

  <!-- apex label, with an opaque halo so it stays legible over the crossing lines -->
  <rect x="418" y="247" width="64" height="18" rx="3" fill="#ffffff"/>
  <text x="450" y="260" text-anchor="middle" font-size="11" fill="#64748b">apex</text>

  <!-- result panels -->
  <!-- Circle -->
  <g>
    <rect x="80" y="430" width="150" height="150" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
    <circle cx="155" cy="505" r="55" fill="none" stroke="#2563eb" stroke-width="2.5"/>
    <text x="155" y="600" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Circle</text>
    <text x="155" y="615" text-anchor="middle" font-size="11" fill="#64748b">plane &#8869; axis: b&#178;-ac&lt;0, a=c, b=0</text>
  </g>
  <!-- Ellipse -->
  <g>
    <rect x="250" y="430" width="150" height="150" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
    <ellipse cx="325" cy="505" rx="60" ry="40" fill="none" stroke="#16a34a" stroke-width="2.5"/>
    <text x="325" y="600" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Ellipse</text>
    <text x="325" y="615" text-anchor="middle" font-size="11" fill="#64748b">tilted plane, one nappe: b&#178;-ac&lt;0</text>
  </g>
  <!-- Parabola -->
  <g>
    <rect x="420" y="430" width="150" height="150" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
    <path d="M 435 555 Q 495 435 555 555" fill="none" stroke="#d97706" stroke-width="2.5"/>
    <text x="495" y="600" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Parabola</text>
    <text x="495" y="615" text-anchor="middle" font-size="11" fill="#64748b">plane &#8741; a generator: b&#178;-ac=0</text>
  </g>
  <!-- Hyperbola -->
  <g>
    <rect x="590" y="430" width="150" height="150" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
    <line x1="625" y1="440" x2="705" y2="570" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4 3"/>
    <line x1="705" y1="440" x2="625" y2="570" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4 3"/>
    <!-- each branch's vertex (closest point to center, 665,505) sits at mid-height; the branch
         flares away from center and hugs its two asymptotes as it approaches the top/bottom -->
    <path d="M 620 440 C 645 472 645 538 620 570" fill="none" stroke="#dc2626" stroke-width="2.5"/>
    <path d="M 710 440 C 685 472 685 538 710 570" fill="none" stroke="#dc2626" stroke-width="2.5"/>
    <text x="665" y="600" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Hyperbola</text>
    <text x="665" y="615" text-anchor="middle" font-size="11" fill="#64748b">plane cuts both nappes: b&#178;-ac&gt;0</text>
  </g>
</svg>
