<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="900" height="400" fill="#ffffff"/>
  <text x="450" y="26" text-anchor="middle" font-size="17" font-weight="600" fill="#111827">Decomposing P into K, R and C</text>

  <rect x="40" y="50" width="230" height="70" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="155" y="80" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">P (3&#215;4, rank 3)</text>
  <text x="155" y="100" text-anchor="middle" font-size="12" fill="#64748b">P = [ M | p&#8324; ], M = K&#183;R</text>

  <line x1="270" y1="85" x2="330" y2="85" stroke="#475569" stroke-width="2"/>
  <polygon points="330,85 320,80 320,90" fill="#475569"/>

  <rect x="330" y="40" width="260" height="90" rx="6" fill="#eef2ff" stroke="#6366f1"/>
  <text x="460" y="62" text-anchor="middle" font-size="13" font-weight="600" fill="#3730a3">RQ decomposition of M</text>
  <text x="460" y="82" text-anchor="middle" font-size="12" fill="#3730a3">M = K&#183;R  (Givens rotations,</text>
  <text x="460" y="98" text-anchor="middle" font-size="12" fill="#3730a3">Numerical Recipes &#167;2.10 / HZ A4.1.1)</text>
  <text x="460" y="118" text-anchor="middle" font-size="11.5" fill="#3730a3">K upper-triangular, diag(K)&gt;0; R orthogonal</text>

  <line x1="590" y1="85" x2="650" y2="85" stroke="#475569" stroke-width="2"/>
  <polygon points="650,85 640,80 640,90" fill="#475569"/>

  <rect x="650" y="40" width="210" height="90" rx="6" fill="#f0fdf4" stroke="#16a34a"/>
  <text x="755" y="62" text-anchor="middle" font-size="13" font-weight="600" fill="#166534">Result</text>
  <text x="755" y="84" text-anchor="middle" font-size="12" fill="#166534">PinholeCameraIntrinsicParameters</text>
  <text x="755" y="102" text-anchor="middle" font-size="12" fill="#166534">Rotation3D</text>

  <!-- Camera center branch -->
  <line x1="155" y1="120" x2="155" y2="170" stroke="#475569" stroke-width="2"/>
  <polygon points="155,170 150,160 160,160" fill="#475569"/>
  <text x="155" y="188" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">Camera center C : find null-space of P (P&#183;C = 0)</text>

  <g>
    <rect x="40" y="210" width="250" height="90" rx="6" fill="#fff7ed" stroke="#d97706"/>
    <text x="165" y="232" text-anchor="middle" font-size="12.5" font-weight="600" fill="#92400e">SVD of P (default)</text>
    <text x="165" y="252" text-anchor="middle" font-size="11.5" fill="#92400e">C = right singular vector of the</text>
    <text x="165" y="268" text-anchor="middle" font-size="11.5" fill="#92400e">zero singular value</text>
    <text x="165" y="288" text-anchor="middle" font-size="11" fill="#92400e">valid even if C is at infinity</text>
  </g>

  <g>
    <rect x="325" y="210" width="250" height="90" rx="6" fill="#fff7ed" stroke="#d97706"/>
    <text x="450" y="232" text-anchor="middle" font-size="12.5" font-weight="600" fill="#92400e">Cofactors / determinants</text>
    <text x="450" y="252" text-anchor="middle" font-size="11.5" fill="#92400e">C<tspan baseline-shift="sub" font-size="8.5">i</tspan> = (-1)<tspan baseline-shift="super" font-size="8.5">i</tspan> det(P without col i)</text>
    <text x="450" y="270" text-anchor="middle" font-size="11.5" fill="#92400e">cheaper than SVD, still valid</text>
    <text x="450" y="288" text-anchor="middle" font-size="11" fill="#92400e">when C is at infinity</text>
  </g>

  <g>
    <rect x="610" y="210" width="250" height="90" rx="6" fill="#fff7ed" stroke="#d97706"/>
    <text x="735" y="232" text-anchor="middle" font-size="12.5" font-weight="600" fill="#92400e">Closed form (finite camera)</text>
    <text x="735" y="252" text-anchor="middle" font-size="12" fill="#92400e">C = -M&#8315;&#185;&#183;p&#8324;</text>
    <text x="735" y="272" text-anchor="middle" font-size="11" fill="#92400e">cheapest; requires det(M)&#8800;0</text>
    <text x="735" y="288" text-anchor="middle" font-size="11" fill="#92400e">(finite, non-degenerate camera)</text>
  </g>

  <rect x="40" y="330" width="820" height="52" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="60" y="352" font-size="12.5" fill="#334155">Cheirality: sign(det M) resolves front/behind-camera ambiguity of the homogeneous, scale-free P (getCameraSign() / fixCameraSign()).</text>
  <text x="60" y="370" font-size="12.5" fill="#334155">Vanishing points = columns 1-3 of P; image of world origin = column 4; principal/axis planes = rows of P.</text>
</svg>
