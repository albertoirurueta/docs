<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="900" height="460" fill="#ffffff"/>
  <text x="450" y="26" text-anchor="middle" font-size="17" font-weight="600" fill="#111827">Triangle centroid and polygon ear-clipping (Van Gogh) triangulation</text>

  <!-- Triangle panel -->
  <g>
    <rect x="30" y="50" width="380" height="340" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
    <polygon points="120,320 320,340 220,100" fill="#bfdbfe" fill-opacity="0.5" stroke="#2563eb" stroke-width="2.5"/>
    <circle cx="220" cy="253.3" r="4" fill="#dc2626"/>
    <line x1="220" y1="253.3" x2="120" y2="320" stroke="#dc2626" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="220" y1="253.3" x2="320" y2="340" stroke="#dc2626" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="220" y1="253.3" x2="220" y2="100" stroke="#dc2626" stroke-width="1" stroke-dasharray="3 3"/>
    <circle cx="120" cy="320" r="4" fill="#111827"/>
    <circle cx="320" cy="340" r="4" fill="#111827"/>
    <circle cx="220" cy="100" r="4" fill="#111827"/>
    <text x="95" y="340" font-size="13" fill="#111827" font-weight="600">v1</text>
    <text x="330" y="352" font-size="13" fill="#111827" font-weight="600">v2</text>
    <text x="222" y="90" font-size="13" fill="#111827" font-weight="600">v3</text>
    <text x="228" y="248" font-size="12" fill="#dc2626">centroid</text>
    <text x="220" y="412" text-anchor="middle" font-size="12.5" fill="#334155">area = &#189;|(v2-v1)&#215;(v3-v1)|, centroid = (v1+v2+v3)/3</text>
  </g>

  <!-- Polygon triangulation panel -->
  <g>
    <rect x="440" y="50" width="430" height="340" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
    <polygon points="510,340 570,180 630,260 690,180 750,340" fill="none" stroke="#2563eb" stroke-width="2.5"/>
    <polygon points="510,340 570,180 630,260" fill="#fde68a" fill-opacity="0.7" stroke="#d97706" stroke-width="2"/>
    <line x1="510" y1="340" x2="630" y2="260" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="4 3"/>
    <line x1="510" y1="340" x2="690" y2="180" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="4 3"/>
    <circle cx="510" cy="340" r="4" fill="#111827"/>
    <circle cx="570" cy="180" r="4" fill="#111827"/>
    <circle cx="630" cy="260" r="4" fill="#111827"/>
    <circle cx="690" cy="180" r="4" fill="#111827"/>
    <circle cx="750" cy="340" r="4" fill="#111827"/>
    <text x="490" y="358" font-size="12" fill="#111827">v1</text>
    <text x="562" y="168" font-size="12" fill="#111827">v2</text>
    <text x="636" y="252" font-size="12" fill="#111827" font-weight="600">v3 (reflex)</text>
    <text x="694" y="168" font-size="12" fill="#111827">v4</text>
    <text x="754" y="358" font-size="12" fill="#111827">v5</text>
    <rect x="560" y="216" width="150" height="18" rx="3" fill="#ffffff" opacity="0.92"/>
    <text x="565" y="230" font-size="12.5" fill="#d97706" font-weight="600">ear (clipped first)</text>
    <text x="655" y="408" text-anchor="middle" font-size="12.5" fill="#334155">isEar(triangle): no vertex inside, locally convex</text>
    <text x="655" y="426" text-anchor="middle" font-size="12.5" fill="#334155">(clockwise) &#8594; the tip vertex is then cut</text>
  </g>
</svg>
