<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="900" height="460" fill="#ffffff"/>
  <text x="450" y="26" text-anchor="middle" font-size="17" font-weight="600" fill="#111827">Minimal sample size = degrees of freedom left after fixing the shape</text>

  <!-- LEFT: Conic -> Circle -->
  <g>
    <rect x="30" y="55" width="380" height="150" rx="6" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="220" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#1d4ed8">Conic: 6 homogeneous params (a,b,c,d,e,f)</text>
    <text x="220" y="100" text-anchor="middle" font-size="12" fill="#334155">up to scale &#8594; 5 DOF</text>
    <text x="220" y="124" text-anchor="middle" font-size="12" fill="#334155">5 points &#8594; homogeneous 5&#215;6 system A&#183;c=0</text>
    <text x="220" y="144" text-anchor="middle" font-size="12" fill="#334155">solved as the null-space of A via SVD</text>
    <text x="220" y="164" text-anchor="middle" font-size="11" fill="#64748b">Conic.setParametersFromPoints</text>
    <text x="220" y="182" text-anchor="middle" font-size="11" fill="#64748b">residual: algebraic |m&#7488;Cm| (default t&#8776;1e-6)</text>

    <line x1="220" y1="205" x2="220" y2="235" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="290" y="224" text-anchor="middle" font-size="11" fill="#64748b">restrict shape: a=c, b=0</text>

    <rect x="30" y="245" width="380" height="150" rx="6" fill="#f0fdf4" stroke="#86efac"/>
    <text x="220" y="270" text-anchor="middle" font-size="13" font-weight="600" fill="#15803d">Circle: a=c=1, b=0 fixed &#8594; only (d,e,f) free</text>
    <text x="220" y="290" text-anchor="middle" font-size="12" fill="#334155">no scale ambiguity left &#8594; 3 DOF</text>
    <text x="220" y="314" text-anchor="middle" font-size="12" fill="#334155">3 points &#8594; square inhomogeneous system A&#183;x=b</text>
    <text x="220" y="334" text-anchor="middle" font-size="12" fill="#334155">solved directly (no SVD needed)</text>
    <text x="220" y="354" text-anchor="middle" font-size="11" fill="#64748b">Circle.setParametersFromPoints</text>
    <text x="220" y="372" text-anchor="middle" font-size="11" fill="#64748b">residual: geometric |dist(center,p) - r| (default t=1.0)</text>
  </g>

  <!-- RIGHT: Quadric -> Sphere -->
  <g>
    <rect x="490" y="55" width="380" height="150" rx="6" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="680" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#1d4ed8">Quadric: 10 homogeneous params (a..j)</text>
    <text x="680" y="100" text-anchor="middle" font-size="12" fill="#334155">up to scale &#8594; 9 DOF</text>
    <text x="680" y="124" text-anchor="middle" font-size="12" fill="#334155">9 points &#8594; homogeneous 9&#215;10 system A&#183;q=0</text>
    <text x="680" y="144" text-anchor="middle" font-size="12" fill="#334155">solved as the null-space of A via SVD</text>
    <text x="680" y="164" text-anchor="middle" font-size="11" fill="#64748b">Quadric.setParametersFromPoints</text>
    <text x="680" y="182" text-anchor="middle" font-size="11" fill="#64748b">residual: algebraic |M&#7488;QM| (default t&#8776;1e-6)</text>

    <line x1="680" y1="205" x2="680" y2="235" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="750" y="224" text-anchor="middle" font-size="11" fill="#64748b">restrict shape: a=b=c, d=e=f=0</text>

    <rect x="490" y="245" width="380" height="150" rx="6" fill="#f0fdf4" stroke="#86efac"/>
    <text x="680" y="270" text-anchor="middle" font-size="13" font-weight="600" fill="#15803d">Sphere: a=b=c=1, d=e=f=0 fixed &#8594; only (g,h,i,j) free</text>
    <text x="680" y="290" text-anchor="middle" font-size="12" fill="#334155">no scale ambiguity left &#8594; 4 DOF</text>
    <text x="680" y="314" text-anchor="middle" font-size="12" fill="#334155">4 points &#8594; square inhomogeneous system A&#183;x=b</text>
    <text x="680" y="334" text-anchor="middle" font-size="12" fill="#334155">solved directly (no SVD needed)</text>
    <text x="680" y="354" text-anchor="middle" font-size="11" fill="#64748b">Sphere.setParametersFromPoints</text>
    <text x="680" y="372" text-anchor="middle" font-size="11" fill="#64748b">residual: geometric |dist(center,p) - r| (default t=1.0)</text>
  </g>

  <text x="450" y="425" text-anchor="middle" font-size="12" fill="#334155">Same pattern one level up: DualConic/DualQuadric fit lines/planes with the same DOF count as Conic/Quadric.</text>
  <text x="450" y="445" text-anchor="middle" font-size="11" fill="#64748b">Minimal sample size always equals the number of remaining free parameters -- never more, never less.</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
