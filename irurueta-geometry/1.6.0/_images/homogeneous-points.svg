<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 560" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowRay" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowInf" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
    <marker id="arrowAxis2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="760" height="560" fill="#ffffff"/>
  <text x="380" y="28" text-anchor="middle" font-size="17" font-weight="600" fill="#111827">Homogeneous coordinates as rays through the origin</text>
  <text x="380" y="48" text-anchor="middle" font-size="12" fill="#64748b">(shown for a projective line P&#185;; the same idea extends to 2D/3D points as rays in R&#179;/R&#8308;)</text>

  <!-- w=1 plane -->
  <line x1="60" y1="200" x2="560" y2="200" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="568" y="204" font-size="13" fill="#475569">w = 1</text>
  <text x="65" y="190" font-size="11.5" fill="#94a3b8">inhomogeneous coordinates live here: x = X / W</text>

  <!-- finite point ray (drawn before the origin markers so it sits behind them) -->
  <line x1="200" y1="450" x2="480" y2="100" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrowRay)"/>
  <circle cx="400" cy="200" r="4.5" fill="#2563eb"/>
  <text x="410" y="222" font-size="12.5" fill="#2563eb" font-weight="600">(1.4, 1) &#8594; x = 1.4</text>
  <circle cx="480" cy="100" r="4.5" fill="#2563eb"/>
  <text x="490" y="105" font-size="12.5" fill="#2563eb" font-weight="600">(2.8, 2) &#8212; same point!</text>

  <!-- point at infinity ray -->
  <line x1="200" y1="450" x2="680" y2="450" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrowInf)"/>
  <text x="330" y="440" font-size="12.5" fill="#dc2626" font-weight="600">direction (1, 0): point at infinity, w = 0</text>

  <!-- origin and local axis hint (drawn last so they sit on top) -->
  <circle cx="200" cy="450" r="4" fill="#111827"/>
  <line x1="200" y1="450" x2="200" y2="405" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowAxis2)"/>
  <text x="206" y="410" font-size="11" fill="#94a3b8">w</text>
  <line x1="200" y1="450" x2="250" y2="450" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowAxis2)"/>
  <text x="252" y="466" font-size="11" fill="#94a3b8">x</text>
  <text x="135" y="480" font-size="12" fill="#334155">O (origin of ray space, w = 0)</text>

  <rect x="40" y="500" width="680" height="46" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="55" y="519" font-size="12.5" fill="#334155">Duality: a 2D line (a,b,c) is itself a point of the dual plane;</text>
  <text x="55" y="538" font-size="12.5" fill="#334155">incidence a&#183;x + b&#183;y + c&#183;w = 0 is symmetric in points and lines.</text>
</svg>
