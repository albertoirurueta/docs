<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="900" height="420" fill="#ffffff"/>
  <text x="450" y="26" text-anchor="middle" font-size="17" font-weight="600" fill="#111827">RANSAC-style consensus: a minimal sample, an inlier threshold, a winning hypothesis</text>

  <!-- LEFT: bad minimal sample (hits an outlier) -->
  <g>
    <text x="215" y="52" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Sample {A,D}: line misses the inliers</text>
    <rect x="40" y="65" width="350" height="240" fill="#f8fafc" stroke="#e2e8f0"/>
    <!-- inlier cloud roughly on a line -->
    <g fill="#16a34a">
      <circle cx="70" cy="260" r="4"/>
      <circle cx="110" cy="235" r="4"/>
      <circle cx="150" cy="222" r="4"/>
      <circle cx="190" cy="200" r="4"/>
      <circle cx="230" cy="185" r="4"/>
      <circle cx="270" cy="165" r="4"/>
      <circle cx="310" cy="150" r="4"/>
      <circle cx="350" cy="130" r="4"/>
    </g>
    <!-- outliers -->
    <circle cx="90" cy="120" r="4" fill="#dc2626"/>
    <text x="90" y="110" text-anchor="middle" font-size="11" fill="#dc2626">D</text>
    <circle cx="330" cy="260" r="4" fill="#dc2626"/>
    <text x="330" y="278" text-anchor="middle" font-size="11" fill="#dc2626">A</text>
    <!-- bad line through the 2 outliers -->
    <line x1="60" y1="135" x2="360" y2="245" stroke="#dc2626" stroke-width="1.8" stroke-dasharray="5 3"/>
    <text x="215" y="292" text-anchor="middle" font-size="11" fill="#64748b">support = 0-1 inliers within threshold t &#8594; rejected</text>
  </g>

  <!-- RIGHT: good minimal sample -->
  <g>
    <text x="685" y="52" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Sample {B,C}: line matches the inliers</text>
    <rect x="470" y="65" width="390" height="240" fill="#f8fafc" stroke="#e2e8f0"/>
    <g fill="#16a34a">
      <circle cx="500" cy="260" r="4"/>
      <circle cx="540" cy="235" r="4"/>
      <circle cx="580" cy="222" r="4"/>
      <circle cx="620" cy="200" r="4"/>
      <circle cx="660" cy="185" r="4"/>
      <circle cx="700" cy="165" r="4"/>
      <circle cx="740" cy="150" r="4"/>
      <circle cx="780" cy="130" r="4"/>
    </g>
    <circle cx="520" cy="120" r="4" fill="#dc2626"/>
    <circle cx="760" cy="260" r="4" fill="#dc2626"/>
    <!-- good line through 2 inliers B,C with inlier band -->
    <polygon points="495,268 800,110 800,130 495,288" fill="#bfdbfe" fill-opacity="0.5"/>
    <line x1="490" y1="278" x2="800" y2="120" stroke="#2563eb" stroke-width="2.2"/>
    <text x="545" y="238" font-size="11" fill="#2563eb">B</text>
    <text x="675" y="178" font-size="11" fill="#2563eb">C</text>
    <text x="685" y="292" text-anchor="middle" font-size="11" fill="#64748b">support = 8 inliers within threshold t &#8594; new best consensus set</text>
  </g>

  <!-- bottom: scoring rules -->
  <text x="30" y="335" font-size="13" font-weight="600" fill="#111827">Scoring a hypothesis from residual e:</text>
  <text x="30" y="358" font-size="12.5" fill="#334155">RANSAC: count(e &lt; t)  --  maximize inliers</text>
  <text x="30" y="378" font-size="12.5" fill="#334155">MSAC: &#931; &#961;(e), &#961;(e)=e&#178; if e&lt;t else t&#178;  --  minimize bounded cost (eq. 4.19)</text>
  <text x="30" y="398" font-size="12.5" fill="#334155">LMedS: minimize median(e&#178;)  --  no threshold needed, fails above ~50% outliers</text>
  <text x="470" y="358" font-size="12.5" fill="#334155">PROSAC / PROMedS: same scoring, but samples are drawn in decreasing</text>
  <text x="470" y="378" font-size="12.5" fill="#334155">quality-score order instead of uniformly at random -- converges sooner</text>
  <text x="470" y="398" font-size="12.5" fill="#334155">when a per-correspondence quality score is available.</text>
</svg>
