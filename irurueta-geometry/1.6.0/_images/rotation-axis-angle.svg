<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 490" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowAxis" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrowV" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowV2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="700" height="490" fill="#ffffff"/>
  <text x="350" y="28" text-anchor="middle" font-size="17" font-weight="600" fill="#111827">3D rotation as axis + angle (Rodrigues / axis-angle / quaternion)</text>

  <!-- rotation axis -->
  <line x1="169.8" y1="346.2" x2="530.2" y2="93.8" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arrowAxis)"/>
  <text x="545" y="90" font-size="13" fill="#7c3aed" font-weight="600">rotation axis u</text>
  <text x="150" y="365" font-size="11" fill="#7c3aed">-u</text>

  <g transform="rotate(15 350 220)">
    <!-- plane swept by the rotating vector, seen in perspective -->
    <ellipse cx="350" cy="220" rx="150" ry="60" fill="#f3f4f6" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 4"/>
    <circle cx="350" cy="220" r="3.5" fill="#111827"/>
    <text x="358" y="215" font-size="12" fill="#334155">O</text>

    <!-- v before rotation -->
    <line x1="350" y1="220" x2="202.3" y2="230.4" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrowV)"/>
    <text x="150" y="238" font-size="14" fill="#2563eb" font-weight="600">v</text>

    <!-- v' after rotation by theta -->
    <line x1="350" y1="220" x2="324.0" y2="279.1" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrowV2)"/>
    <text x="300" y="300" font-size="14" fill="#dc2626" font-weight="600">v' = R(u,&#952;)&#183;v</text>

    <!-- theta arc -->
    <path d="M 310.6 226.9 A 40 40 0 0 1 343.1 259.4" fill="none" stroke="#475569" stroke-width="1.5"/>
    <text x="303" y="262" font-size="13" fill="#475569">&#952;</text>
  </g>

  <rect x="60" y="385" width="580" height="90" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="80" y="406" font-size="13" fill="#334155">Quaternion:  q = ( cos(&#952;/2),  sin(&#952;/2)&#183;u )</text>
  <text x="80" y="428" font-size="13" fill="#334155">Rodrigues matrix:  R = I + sin&#952;&#183;[u]&#215; + (1-cos&#952;)&#183;[u]&#215;&#178;</text>
  <text x="80" y="450" font-size="13" fill="#334155">where [u]&#215; is the skew-symmetric cross-product matrix of u</text>
</svg>
