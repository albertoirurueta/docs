<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="900" height="500" fill="#ffffff"/>
  <text x="450" y="26" text-anchor="middle" font-size="17" font-weight="600" fill="#111827">Conic vs. dual conic: locus of points vs. envelope of tangent lines</text>

  <!-- Locus-of-points panel -->
  <g>
    <rect x="20" y="60" width="420" height="340" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
    <ellipse cx="220" cy="230" rx="140" ry="90" fill="none" stroke="#2563eb" stroke-width="2.5"/>
    <g fill="#111827">
      <circle cx="360" cy="230" r="4"/>
      <circle cx="290" cy="307.9" r="4"/>
      <circle cx="150" cy="307.9" r="4"/>
      <circle cx="80" cy="230" r="4"/>
      <circle cx="150" cy="152.1" r="4"/>
      <circle cx="290" cy="152.1" r="4"/>
    </g>
    <text x="368" y="225" font-size="13" font-weight="600" fill="#2563eb">x</text>
    <text x="220" y="420" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Conic C: locus of points</text>
    <text x="220" y="436" text-anchor="middle" font-size="12" fill="#64748b">a point x is on C when x&#7488;&#183;C&#183;x = 0</text>
  </g>

  <!-- Envelope-of-tangent-lines panel -->
  <g>
    <rect x="460" y="60" width="420" height="340" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
    <ellipse cx="680" cy="230" rx="140" ry="90" fill="none" stroke="#cbd5e1" stroke-width="1.3" stroke-dasharray="4 3"/>
    <g stroke="#16a34a" stroke-width="2.2">
      <line x1="820" y1="195" x2="820" y2="265"/>
      <line x1="819.5" y1="259.7" x2="767.1" y2="306.1"/>
      <line x1="757.5" y1="308.5" x2="689.1" y2="322.7"/>
      <line x1="670.9" y1="322.7" x2="602.5" y2="308.5"/>
      <line x1="592.9" y1="306.1" x2="540.5" y2="259.7"/>
      <line x1="540" y1="265" x2="540" y2="195"/>
      <line x1="540.5" y1="200.3" x2="592.9" y2="153.9"/>
      <line x1="602.5" y1="151.5" x2="670.9" y2="137.3"/>
      <line x1="689.1" y1="137.3" x2="757.5" y2="151.5"/>
      <line x1="767.1" y1="153.9" x2="819.5" y2="200.3"/>
    </g>
    <text x="826" y="234" font-size="13" font-weight="600" fill="#16a34a">l</text>
    <text x="680" y="420" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Dual conic C*: envelope of tangent lines</text>
    <text x="680" y="436" text-anchor="middle" font-size="12" fill="#64748b">a line l is tangent to C when l&#7488;&#183;C*&#183;l = 0, where C* = C&#8315;&#185;</text>
  </g>

  <rect x="60" y="458" width="780" height="32" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="479" text-anchor="middle" font-size="12.5" fill="#334155">The same duality applies one dimension up: a Quadric (locus of points) has a DualQuadric (envelope of tangent planes), Q* = Q&#8315;&#185;.</text>
</svg>
