<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="900" height="380" fill="#ffffff"/>
  <text x="450" y="26" text-anchor="middle" font-size="17" font-weight="600" fill="#111827">The absolute conic &#937;&#8734; and the dual absolute quadric Q*&#8734;</text>

  <!-- LEFT: absolute conic on plane at infinity -->
  <g>
    <text x="220" y="52" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">&#937;&#8734; on the plane at infinity &#928;&#8734;</text>
    <polygon points="60,220 380,180 400,300 80,340" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="5 4"/>
    <text x="70" y="215" font-size="12" fill="#64748b">&#928;&#8734;</text>
    <ellipse cx="230" cy="255" rx="70" ry="34" fill="none" stroke="#2563eb" stroke-width="2.2"/>
    <text x="230" y="258" text-anchor="middle" font-size="13" font-weight="600" fill="#2563eb">&#937;&#8734;</text>
    <text x="230" y="300" text-anchor="middle" font-size="11" fill="#64748b">conic of purely imaginary points, x&#178;+y&#178;+z&#178;=0, w=0</text>
    <line x1="185" y1="228" x2="275" y2="282" stroke="#16a34a" stroke-width="1.6"/>
    <text x="280" y="222" font-size="11" fill="#16a34a">tangent line &#8712; &#937;*&#8734;</text>
  </g>

  <line x1="450" y1="70" x2="450" y2="340" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- RIGHT: absolute (dual) quadric intersecting plane at infinity -->
  <g>
    <text x="675" y="52" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Q&#8734; / Q*&#8734; meeting &#928;&#8734; in &#937;&#8734;</text>
    <ellipse cx="680" cy="215" rx="150" ry="80" fill="#fecaca" fill-opacity="0.35" stroke="#dc2626" stroke-width="2"/>
    <text x="680" y="150" text-anchor="middle" font-size="12" font-weight="600" fill="#dc2626">Q&#8734; (sphere of imaginary points, radius &#8594; &#8734;)</text>
    <polygon points="530,255 830,220 850,320 550,340" fill="#f8fafc" fill-opacity="0.75" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="5 4"/>
    <text x="540" y="250" font-size="12" fill="#64748b">&#928;&#8734;</text>
    <ellipse cx="680" cy="280" rx="95" ry="24" fill="none" stroke="#2563eb" stroke-width="2.2"/>
    <text x="680" y="284" text-anchor="middle" font-size="12" font-weight="600" fill="#2563eb">&#937;&#8734; = Q&#8734; &#8745; &#928;&#8734;</text>
    <text x="680" y="330" text-anchor="middle" font-size="11" fill="#64748b">Q*&#8734; = planes tangent to Q&#8734; (a rank-3 dual quadric)</text>
  </g>

  <text x="30" y="368" font-size="12.5" fill="#334155">Metric stratum: &#937;&#8734; = I<tspan baseline-shift="sub" font-size="9">3x3</tspan> = &#937;*&#8734;<tspan baseline-shift="super" font-size="9">-1</tspan>, and Q*&#8734; = diag(1,1,1,0) -- fixed (up to scale) by similarity transformations only.</text>
</svg>
