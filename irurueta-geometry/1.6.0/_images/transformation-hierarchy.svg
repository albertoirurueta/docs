<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 315" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="900" height="315" fill="#ffffff"/>
  <text x="450" y="26" text-anchor="middle" font-size="17" font-weight="600" fill="#111827">Transformation hierarchy: Euclidean ⊂ Metric ⊂ Affine ⊂ Projective</text>

  <!-- Reference panel -->
  <g>
    <rect x="20" y="90" width="150" height="150" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
    <polygon points="65,135 125,135 125,195 65,195" fill="#bfdbfe" stroke="#2563eb" stroke-width="2"/>
    <text x="95" y="256" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Reference square</text>
    <text x="95" y="271" text-anchor="middle" font-size="11" fill="#64748b">unit shape</text>
  </g>

  <line x1="174" y1="165" x2="192" y2="165" marker-end="url(#arrow)" stroke="#475569" stroke-width="2.5"/>

  <!-- Euclidean panel -->
  <g>
    <rect x="196" y="90" width="150" height="150" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
    <polygon points="256.49,125.13 310.87,150.49 285.51,204.87 231.13,179.51" fill="#bfdbfe" stroke="#2563eb" stroke-width="2"/>
    <text x="271" y="256" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Euclidean (rigid)</text>
    <text x="271" y="271" text-anchor="middle" font-size="11" fill="#64748b">rotation + translation</text>
    <text x="271" y="284" text-anchor="middle" font-size="11" fill="#64748b">3 / 6 DoF</text>
  </g>

  <line x1="350" y1="165" x2="368" y2="165" marker-end="url(#arrow)" stroke="#475569" stroke-width="2.5"/>

  <!-- Metric / Similarity panel -->
  <g>
    <rect x="372" y="90" width="150" height="150" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
    <polygon points="424.96,152.27 459.73,142.96 469.04,177.73 434.27,187.04" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
    <text x="447" y="256" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Metric (similarity)</text>
    <text x="447" y="271" text-anchor="middle" font-size="11" fill="#64748b">+ uniform scale</text>
    <text x="447" y="284" text-anchor="middle" font-size="11" fill="#64748b">4 / 7 DoF</text>
  </g>

  <line x1="526" y1="165" x2="544" y2="165" marker-end="url(#arrow)" stroke="#475569" stroke-width="2.5"/>

  <!-- Affine panel -->
  <g>
    <rect x="548" y="90" width="150" height="150" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
    <polygon points="578,129 638,141 653,201 593,189" fill="#fde68a" stroke="#d97706" stroke-width="2"/>
    <text x="623" y="256" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Affine</text>
    <text x="623" y="271" text-anchor="middle" font-size="11" fill="#64748b">+ scale &amp; skew</text>
    <text x="623" y="284" text-anchor="middle" font-size="11" fill="#64748b">6 / 12 DoF</text>
  </g>

  <line x1="702" y1="165" x2="720" y2="165" marker-end="url(#arrow)" stroke="#475569" stroke-width="2.5"/>

  <!-- Projective panel -->
  <g>
    <rect x="724" y="90" width="150" height="150" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
    <polygon points="784,130 814,130 844,200 754,200" fill="#fecaca" stroke="#dc2626" stroke-width="2"/>
    <text x="799" y="256" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Projective</text>
    <text x="799" y="271" text-anchor="middle" font-size="11" fill="#64748b">homography</text>
    <text x="799" y="284" text-anchor="middle" font-size="11" fill="#64748b">8 / 15 DoF</text>
  </g>

  <text x="450" y="304" text-anchor="middle" font-size="11.5" fill="#475569">Each arrow means "is a special case of" — parallelism, ratios, angles and distances are preserved only up to the labeled family.</text>
</svg>
