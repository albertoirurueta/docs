<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="900" height="470" fill="#ffffff"/>
  <text x="450" y="26" text-anchor="middle" font-size="17" font-weight="600" fill="#111827">KDTree: recursive axis-aligned Box partitioning of a point set</text>

  <!-- spatial partition panel -->
  <g>
    <rect x="60" y="60" width="320" height="320" fill="none" stroke="#334155" stroke-width="2"/>
    <!-- depth 2 splits (green) -->
    <line x1="130" y1="240" x2="130" y2="380" stroke="#16a34a" stroke-width="2"/>
    <line x1="310" y1="60" x2="310" y2="200" stroke="#16a34a" stroke-width="2"/>
    <!-- depth 1 splits (blue) -->
    <line x1="60" y1="240" x2="210" y2="240" stroke="#2563eb" stroke-width="2"/>
    <line x1="210" y1="200" x2="380" y2="200" stroke="#2563eb" stroke-width="2"/>
    <!-- depth 0 split (red) -->
    <line x1="210" y1="60" x2="210" y2="380" stroke="#dc2626" stroke-width="2.5"/>

    <g fill="#111827">
      <circle cx="120" cy="100" r="4"/>
      <circle cx="300" cy="90" r="4"/>
      <circle cx="200" cy="180" r="4"/>
      <circle cx="100" cy="300" r="4"/>
      <circle cx="340" cy="320" r="4"/>
      <circle cx="160" cy="340" r="4"/>
      <circle cx="260" cy="260" r="4"/>
      <circle cx="90" cy="180" r="4"/>
      <circle cx="320" cy="180" r="4"/>
    </g>
    <text x="220" y="405" text-anchor="middle" font-size="12.5" fill="#334155">split dimension cycles at each depth; split position = median point coordinate</text>
  </g>

  <!-- tree panel -->
  <g font-size="12" fill="#334155">
    <line x1="620" y1="98" x2="540" y2="160" stroke="#dc2626" stroke-width="2"/>
    <line x1="620" y1="98" x2="700" y2="160" stroke="#dc2626" stroke-width="2"/>
    <line x1="540" y1="180" x2="500" y2="250" stroke="#2563eb" stroke-width="2"/>
    <line x1="540" y1="180" x2="580" y2="250" stroke="#2563eb" stroke-width="2"/>
    <line x1="700" y1="180" x2="660" y2="250" stroke="#2563eb" stroke-width="2"/>
    <line x1="700" y1="180" x2="740" y2="250" stroke="#2563eb" stroke-width="2"/>

    <rect x="580" y="70" width="80" height="28" rx="5" fill="#f8fafc" stroke="#475569"/>
    <text x="620" y="89" text-anchor="middle">root: 9 pts</text>

    <rect x="495" y="160" width="90" height="26" rx="5" fill="#f8fafc" stroke="#475569"/>
    <text x="540" y="178" text-anchor="middle" font-size="11">x&lt;210: 5 pts</text>
    <rect x="655" y="160" width="90" height="26" rx="5" fill="#f8fafc" stroke="#475569"/>
    <text x="700" y="178" text-anchor="middle" font-size="11">x&gt;210: 4 pts</text>

    <rect x="465" y="250" width="70" height="26" rx="5" fill="#f0fdf4" stroke="#16a34a"/>
    <text x="500" y="268" text-anchor="middle" font-size="10.5">leaf: 3 pts</text>
    <rect x="545" y="250" width="70" height="26" rx="5" fill="#f0fdf4" stroke="#16a34a"/>
    <text x="580" y="268" text-anchor="middle" font-size="10.5">leaf: 2 pts</text>
    <rect x="625" y="250" width="70" height="26" rx="5" fill="#f0fdf4" stroke="#16a34a"/>
    <text x="660" y="268" text-anchor="middle" font-size="10.5">leaf: 2 pts</text>
    <rect x="705" y="250" width="70" height="26" rx="5" fill="#f0fdf4" stroke="#16a34a"/>
    <text x="740" y="268" text-anchor="middle" font-size="10.5">leaf: 2 pts</text>
  </g>

  <rect x="440" y="330" width="410" height="100" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="460" y="350" font-size="12.5" fill="#334155">Each BoxNode extends Box, storing lo/hi corners</text>
  <text x="460" y="370" font-size="12.5" fill="#334155">plus mom/dau1/dau2 indices for the tree structure.</text>
  <text x="460" y="390" font-size="12.5" fill="#334155">Nearest-neighbor search prunes a subtree once</text>
  <text x="460" y="410" font-size="12.5" fill="#334155">its box's getDistance() exceeds the current best.</text>
</svg>
