<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 520" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowRay2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="780" height="520" fill="#ffffff"/>
  <text x="390" y="26" text-anchor="middle" font-size="17" font-weight="600" fill="#111827">Pinhole camera: mapping a 3D point to a 2D image point</text>

  <!-- frustum -->
  <g stroke="#cbd5e1" stroke-width="1.3" stroke-dasharray="4 3" fill="none">
    <line x1="150" y1="300" x2="354" y2="132"/>
    <line x1="150" y1="300" x2="354" y2="468"/>
  </g>

  <!-- image plane -->
  <rect x="320" y="160" width="60" height="280" fill="#f3f4f6" stroke="#475569" stroke-width="1.5"/>
  <text x="350" y="150" text-anchor="middle" font-size="12" fill="#475569">image plane</text>

  <!-- principal axis -->
  <line x1="150" y1="300" x2="700" y2="300" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="6 4"/>
  <text x="640" y="316" font-size="12" fill="#94a3b8">principal axis</text>
  <circle cx="350" cy="300" r="3.5" fill="#475569"/>
  <text x="358" y="316" font-size="11.5" fill="#475569">principal point p&#8320;</text>

  <!-- camera center -->
  <circle cx="150" cy="300" r="5" fill="#111827"/>
  <text x="110" y="330" font-size="13" font-weight="600" fill="#111827">C</text>
  <text x="60" y="348" font-size="11.5" fill="#334155">camera center</text>

  <!-- 3D point and projection ray -->
  <circle cx="620" cy="140" r="5" fill="#dc2626"/>
  <text x="630" y="135" font-size="13" font-weight="600" fill="#dc2626">X (3D point)</text>
  <line x1="620" y1="140" x2="150" y2="300" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowRay2)"/>
  <circle cx="350" cy="231.9" r="4.5" fill="#2563eb"/>
  <text x="388" y="255" font-size="13" font-weight="600" fill="#2563eb">x = P&#183;X</text>

  <rect x="60" y="440" width="660" height="66" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="80" y="462" font-size="13" fill="#334155">P = K [ R | -R&#183;C ]  (3&#215;4 matrix, up to scale)</text>
  <text x="80" y="484" font-size="12.5" fill="#334155">columns 1-3 of P: vanishing points of the world X/Y/Z axes &#8226; column 4: image of the world origin</text>
  <text x="80" y="500" font-size="12.5" fill="#334155">rows of P: horizontal/vertical/principal planes of the viewing frustum</text>
</svg>
