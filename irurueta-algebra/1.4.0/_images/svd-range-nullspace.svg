<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1060" font-family="Helvetica Neue, Arial, sans-serif">
<title>Nonsingular vs. singular linear maps: range, nullspace, and the SVD least-squares solution (after Numerical Recipes Fig. 2.6.1)</title>
<defs><marker id="ah2" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#9aa0a6"/></marker><marker id="ah-ink" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 z" fill="#1a1a2e"/></marker></defs>
<text x="30" y="40" font-size="18" fill="#1a1a2e" font-weight="600">(a) nonsingular A: domain and codomain have the same dimension</text>
