<circle cx="210" cy="220" r="3.2" fill="#1a1a2e"/>
<circle cx="720" cy="220" r="3.2" fill="#1a1a2e"/>
<line x1="210" y1="220" x2="228" y2="125" stroke="#1a1a2e" stroke-width="2.6" marker-end="url(#ah-ink)"/>
<text x="238" y="160" font-size="16" fill="#1a1a2e" font-weight="600">x</text>
<line x1="720" y1="220" x2="746" y2="125" stroke="#2f6fed" stroke-width="3.2" marker-end="url(#ah2)"/>
<text x="758" y="160" font-size="16" fill="#2f6fed" font-weight="600">b</text>
<path d="M 330,150 Q 465.0,60 600,150" fill="none" stroke="#9aa0a6" stroke-width="5" marker-end="url(#ah2)"/>
<circle cx="465.0" cy="102" r="17" fill="#ffffff" stroke="#9aa0a6" stroke-width="1.5"/>
<text x="465.0" y="108" font-size="16" fill="#1a1a2e" text-anchor="middle" font-weight="600">A</text>
<text x="465.0" y="370" font-size="16" fill="#1a1a2e" text-anchor="middle">A &#183; x = b</text>
<text x="30" y="390" font-size="18" fill="#1a1a2e" font-weight="600">(b) singular A: the domain collapses onto a lower-dimensional range</text>
<path d="M -95,15 C -80,-45 -30,-70 15,-55 C 55,-42 70,-75 105,-58 C 130,-45 138,-10 118,18 C 100,42 108,70 78,90 C 45,112 5,95 -25,108 C -60,122 -100,100 -112,65 C -122,38 -112,45 -95,15 Z" fill="none" stroke="#1a1a2e" stroke-width="2.2" transform="translate(210 650) "/>
