<circle cx="200" cy="910" r="5" fill="#e2703a"/>
<text x="215" y="915" font-size="14" fill="#1a1a2e">SVD picks the solution of smallest length (closest to the origin)</text>
<circle cx="200" cy="938" r="5" fill="#7a8090"/>
<text x="215" y="943" font-size="14" fill="#1a1a2e">c lies outside the range: no exact solution, SVD returns the least-squares point c&#8242;</text>
</svg>
