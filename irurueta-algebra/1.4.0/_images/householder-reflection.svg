<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" font-family="Helvetica Neue, Arial, sans-serif">
<title>Householder reflection used to zero the entries below the diagonal in one column</title>
<defs><marker id="ah-ink" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#1a1a2e"/></marker><marker id="ah-blue" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#2f6fed"/></marker><marker id="ah-orange" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#e2703a"/></marker></defs><g transform="translate(0,-140)">
<line x1="200" y1="340" x2="505" y2="340" stroke="#9aa0a6" stroke-width="1.4" marker-end="url(#ah-ink)"/>
<text x="515" y="345" font-size="16" fill="#1a1a2e">e<tspan baseline-shift="sub" font-size="11.52">1</tspan></text>
<line x1="51.5492089815705" y1="437.2022002003609" x2="468.4507910184295" y2="242.7977997996391" stroke="#7a8090" stroke-width="1.6" stroke-dasharray="7,5"/>
<text x="482.4507910184295" y="246.7977997996391" font-size="14.5" fill="#7a8090">reflecting hyperplane (perp. to v)</text>
<line x1="260" y1="340" x2="372.4878316951444" y2="205.94222245417885" stroke="#1a1a2e" stroke-width="3" marker-end="url(#ah-ink)"/>
<text x="382.4878316951444" y="197.94222245417885" font-size="17" fill="#1a1a2e" font-weight="600">x</text>
<line x1="260" y1="340" x2="435" y2="340" stroke="#2f6fed" stroke-width="3" marker-end="url(#ah-blue)"/>
<text x="425" y="326" font-size="17" fill="#2f6fed" text-anchor="end" font-weight="600">Hx = ||x|| e<tspan baseline-shift="sub" font-size="12">1</tspan></text>
<line x1="435" y1="340" x2="372.4878316951444" y2="205.94222245417885" stroke="#e2703a" stroke-width="2.4" stroke-dasharray="2,3" marker-end="url(#ah-orange)"/>
<text x="413.7439158475722" y="266.9711112270894" font-size="15.5" fill="#e2703a">v = x &#8722; ||x|| e<tspan baseline-shift="sub" font-size="11">1</tspan></text>
<circle cx="260" cy="340" r="3.4" fill="#1a1a2e"/>
<text x="246" y="362" font-size="14" fill="#1a1a2e" text-anchor="middle">0</text>
<path d="M 309.84692828701577,316.75599560426156 A 55,55 0 0 0 295.35331853275966,297.8675556284562" fill="none" stroke="#7a8090" stroke-width="1.3"/>
<path d="M 300.0,340.0 A 40,40 0 0 0 296.252311481466,323.09526953037204" fill="none" stroke="#7a8090" stroke-width="1.3"/>
<text x="30" y="470" font-size="14.5" fill="#1a1a2e">Reflecting <tspan font-weight="600">x</tspan> through the hyperplane orthogonal to <tspan fill="#e2703a" font-weight="600">v</tspan> maps it onto the <tspan fill="#2f6fed" font-weight="600">e<tspan baseline-shift="sub" font-size="11">1</tspan></tspan> axis, zeroing every component but the first.</text>
<text x="30" y="496" font-size="14.5" fill="#1a1a2e">H = I &#8722; 2vv<tspan baseline-shift="super" font-size="11">T</tspan>&#8260;(v<tspan baseline-shift="super" font-size="11">T</tspan>v) is symmetric and orthogonal, so ||Hx|| = ||x||.</text>
</g></svg>
